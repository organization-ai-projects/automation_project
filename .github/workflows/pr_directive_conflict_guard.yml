name: PR Directive Conflict Guard

on:
  pull_request_target:
    types: [opened, edited, reopened, synchronize]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull request number to evaluate"
        required: true

permissions:
  pull-requests: write
  issues: write
  contents: read

jobs:
  guard-directive-conflicts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.base.ref || 'dev' }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build versioning_automation
        run: cargo build -p versioning_automation

      - name: Ensure dependencies
        run: |
          for cmd in gh jq perl; do
            if ! command -v "$cmd" >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y jq perl
              break
            fi
          done

      - name: Guard directive conflicts (pull_request_target)
        if: github.event_name == 'pull_request_target'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          target/debug/versioning_automation pr directive-conflict-guard \
            --pr "$PR_NUMBER" \
            --repo "$GH_REPO"

      - name: Guard directive conflicts (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          if [[ -z "$PR_NUMBER" || ! "$PR_NUMBER" =~ ^[0-9]+$ ]]; then
            echo "Invalid pr_number: '$PR_NUMBER'" >&2
            exit 1
          fi
          target/debug/versioning_automation pr directive-conflict-guard \
            --pr "$PR_NUMBER" \
            --repo "$GH_REPO"

name: Automation - Closure Hygiene on Main Merge

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: closure-hygiene-main-merge
  cancel-in-progress: false

jobs:
  closure-hygiene:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build versioning_automation
        run: cargo build -p versioning_automation

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Run closure hygiene
        run: |
          target/debug/versioning_automation issue closure-hygiene --repo "$GH_REPO"

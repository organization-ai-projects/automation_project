name: PR Validation Status Refresh

on:
  workflow_run:
    workflows:
      - Rust CI (dev)
      - Rust CI (main)
      - Scripts Integrity
      - Auto markdownlint
      - Auto rustfmt
    types:
      - completed

permissions:
  contents: read
  pull-requests: write
  issues: read

jobs:
  refresh-pr-validation-status:
    if: github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Resolve PR number
        id: pr
        run: |
          pr_number="$(jq -r '.workflow_run.pull_requests[0].number // empty' "$GITHUB_EVENT_PATH")"
          if [[ -z "${pr_number}" || ! "${pr_number}" =~ ^[0-9]+$ ]]; then
            echo "No pull request associated with this workflow run; skipping."
            echo "pr_number=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "pr_number=${pr_number}" >> "$GITHUB_OUTPUT"

      - name: Checkout dev scripts
        if: steps.pr.outputs.pr_number != ''
        uses: actions/checkout@v4
        with:
          ref: dev
          sparse-checkout: |
            scripts/versioning/file_versioning/github/
          sparse-checkout-cone-mode: false

      - name: Ensure jq is available
        if: steps.pr.outputs.pr_number != ''
        run: |
          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update && sudo apt-get install -y jq
          else
            jq --version
          fi

      - name: Refresh PR description validation status
        if: steps.pr.outputs.pr_number != ''
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
        run: |
          chmod +x scripts/versioning/file_versioning/github/generate_pr_description.sh
          bash scripts/versioning/file_versioning/github/generate_pr_description.sh \
            --refresh-pr "${PR_NUMBER}" "${PR_NUMBER}" --yes
